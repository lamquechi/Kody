<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5">
<link rel="icon" type="image/svg+xml" href="favicon.svg?v=12">
<meta property="og:type" content="article">
<meta property="og:site_name" content="Kody Lâm">

<meta property="og:description" content="A quiet reading room for bilingual short fiction and tản văn.">

<title>Reading — Kody Lâm</title>
<meta name="description" content="A quiet reading room — turn the pages of short fiction and tản văn.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400;1,9..144,500&family=Spectral:ital,wght@0,300;0,400;0,500;1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ── reading themes (day / sepia / night) ── */
  body.day  { --desk:#E7DECB; --page:#F7F2E8; --page2:#F1EADB; --text:#1B160F; --muted:#665943; --faint:#93845E; --accent:#B0432B; --edge:#E2D7C1; --spine:rgba(0,0,0,.12); }
  body.sepia{ --desk:#241D12; --page:#ECDFC0; --page2:#E5D7B4; --text:#2A2317; --muted:#675838; --faint:#897A52; --accent:#9A5A2E; --edge:#D8C8A2; --spine:rgba(0,0,0,.16); }
  body.night{ --desk:#0C0910; --page:#17140D; --page2:#1C180F; --text:#ECE2CE; --muted:#A89C84; --faint:#867B5D; --accent:#D9714D; --edge:#241E14; --spine:rgba(0,0,0,.55); }

  :root{ --disp:"Fraunces",Georgia,serif; --body:"Spectral",Georgia,serif; --mono:"JetBrains Mono",monospace;
    --cine:cubic-bezier(.16,1,.3,1); --turn:cubic-bezier(.42,0,.2,1); --fs:20px; --lh:1.8; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--body);background:var(--desk);color:var(--text);-webkit-font-smoothing:antialiased;overflow:hidden;
    transition:background .5s ease,color .5s ease;
    background-image:radial-gradient(120vw 90vh at 50% 50%, transparent 40%, rgba(0,0,0,.18))}

  /* ── chrome ── */
  .chrome{position:fixed;top:0;left:0;right:0;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 22px;font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
  .chrome a,.chrome button{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:none;transition:color .2s}
  .chrome a:hover,.chrome button:hover{color:var(--accent)}
  .chrome .back .arrow{display:inline-block;margin-right:6px;transition:transform .25s var(--cine)}
  .chrome .back:hover .arrow{transform:translateX(-4px)}
  .chrome .mid{font-family:var(--disp);font-style:italic;text-transform:none;letter-spacing:.01em;font-size:15px;color:var(--text);max-width:46vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tools{display:flex;align-items:center;gap:14px;min-width:0}
  .tools .seg{display:inline-flex;border:1px solid var(--edge);border-radius:100px;overflow:hidden}
  .tools .seg button{padding:6px 11px;color:var(--muted)}
  .tools .seg button.on{background:var(--accent);color:var(--page)}

  /* ── stage + book ── */
  .stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:62px 18px 84px;perspective:2400px}
  .book{position:relative;width:min(var(--bookw,940px),95vw);height:min(74vh,820px);transform-style:preserve-3d}
  .book.one{width:min(560px,94vw)}
  .book::after{content:"";position:absolute;left:0;right:0;bottom:-22px;height:30px;background:radial-gradient(60% 100% at 50% 0,rgba(0,0,0,.30),transparent 72%);z-index:0}

  .pg{background:var(--page);color:var(--text);overflow:hidden;display:flex;flex-direction:column;
    padding:clamp(28px,3.6vw,52px) clamp(24px,3.4vw,48px)}
  .leaf{position:absolute;top:0;height:100%;width:50%}
  .leaf.left{left:0;border-radius:5px 0 0 5px;box-shadow:inset -14px 0 26px -18px rgba(0,0,0,.5), 0 16px 40px -24px rgba(0,0,0,.5);background-image:linear-gradient(270deg, var(--spine), transparent 9%)}
  .leaf.right{right:0;border-radius:0 5px 5px 0;box-shadow:inset 14px 0 26px -18px var(--spine), 0 16px 40px -24px rgba(0,0,0,.5);background-image:linear-gradient(90deg, var(--spine), transparent 9%)}
  .book.one .leaf.left{display:none}
  .book.one .leaf.right{width:100%;border-radius:5px;box-shadow:0 18px 44px -22px rgba(0,0,0,.55)}

  .flip{position:absolute;top:0;right:0;width:50%;height:100%;z-index:9;transform-origin:left center;transform-style:preserve-3d;display:none}
  .book.one .flip{width:100%}
  .flip.show{display:block}
  .flip .face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden}
  .flip .front{border-radius:0 5px 5px 0;box-shadow:0 16px 44px -22px rgba(0,0,0,.55);background-image:linear-gradient(90deg, var(--spine), transparent 9%)}
  .book.one .flip .front{border-radius:5px}
  .flip .back{transform:rotateY(180deg);border-radius:5px 0 0 5px;background-image:linear-gradient(270deg, var(--spine), transparent 9%)}
  .flipping .flip{transition:transform .8s var(--turn)}

  /* ── page content ── */
  .head{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--faint);display:flex;justify-content:space-between;margin-bottom:clamp(16px,2.6vw,30px);flex:0 0 auto}
  .num{text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--faint);flex:0 0 auto;padding-top:12px}
  .copy{font-size:var(--fs);line-height:var(--lh);flex:1 1 auto;min-height:0;overflow:hidden}
  .copy p{margin-bottom:1.02em;font-family:var(--readfont,var(--body))}.copy p:last-child{margin-bottom:0}.copy em{font-style:italic}.copy strong{font-weight:600}
  .copy .pull{font-family:var(--disp);font-style:italic;font-weight:300;font-size:clamp(20px,2.3vw,27px);line-height:1.34;color:var(--accent);border-left:2px solid var(--accent);padding-left:18px;margin:4px 0 1.02em}
  .copy .chap{margin-bottom:clamp(18px,2.6vw,30px)}
  .copy .chap .cnum{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
  .copy .chap .ctitle{font-family:var(--disp);font-weight:400;font-size:clamp(21px,2.5vw,28px);line-height:1.08;color:var(--text)}
  .copy .chap + p::first-letter{font-family:var(--disp);float:left;font-size:3.2em;line-height:.82;padding:6px 10px 0 0;color:var(--accent);font-style:italic}
  .opening{flex:1 1 auto;display:flex;flex-direction:column;justify-content:center;text-align:center}
  .opening .folio{font-family:var(--mono);font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--accent);margin-bottom:24px}
  .opening h1{font-family:var(--disp);font-weight:400;font-size:clamp(32px,4.6vw,52px);line-height:1.04;letter-spacing:-0.02em;margin-bottom:20px}
  .opening h1 em{font-style:italic;color:var(--accent)}
  .opening .by{font-family:var(--disp);font-style:italic;font-size:18px;color:var(--muted)}
  .opening .rule{width:60px;height:1px;background:var(--accent);margin:22px auto}
  .opening .meta{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);margin-top:20px}
  .blank{background:var(--page2)}

  /* ── turn zones + bar + progress + toc ── */
  .zone{position:fixed;top:62px;bottom:84px;width:22%;z-index:20;cursor:pointer}
  .zone.prev{left:0}.zone.next{right:0}
  .zone::after{content:"";position:absolute;top:50%;width:30px;height:30px;border-top:1px solid var(--faint);border-right:1px solid var(--faint);opacity:0;transition:opacity .25s}
  .zone.next::after{right:20px;transform:translateY(-50%) rotate(45deg)}
  .zone.prev::after{left:20px;transform:translateY(-50%) rotate(-135deg)}
  .zone:hover::after{opacity:.45}
  .bar{position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;align-items:center;justify-content:center;gap:24px;padding:15px;font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .bar button{font:inherit;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);background:none;border:none;cursor:pointer;transition:color .2s}
  .bar button:hover{color:var(--accent)}.bar button[disabled]{opacity:.3;cursor:default}
  .bar .count{min-width:84px;text-align:center;color:var(--text)}
  .progress{position:fixed;left:0;bottom:0;height:2px;background:var(--accent);width:0;z-index:31;transition:width .45s var(--cine)}
  .toc{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;padding:24px}
  .toc.open{display:flex}
  .toc-card{background:var(--page);color:var(--text);max-width:460px;width:100%;padding:28px 28px 20px;border-radius:4px;box-shadow:0 30px 70px -30px rgba(0,0,0,.7);max-height:82vh;overflow:auto}
  .toc-card h4{font-family:var(--mono);font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--accent);margin-bottom:14px}
  .toc-card .x{float:right;font-family:var(--mono);font-size:11px;color:var(--muted);cursor:pointer}
  .toc-card .lead{font-family:var(--disp);font-style:italic;font-size:14px;color:var(--muted);margin-bottom:6px}
  .toc-card button{display:flex;justify-content:space-between;align-items:baseline;gap:14px;width:100%;text-align:left;background:none;border:none;border-top:1px solid var(--edge);padding:13px 2px;cursor:pointer;transition:color .2s}
  .toc-card button .t{font-family:var(--disp);font-size:18px;color:var(--text);transition:color .2s}
  .toc-card button .m{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);white-space:nowrap}
  .toc-card button:hover .t{color:var(--accent)}
  .toc-card button.cur .t{color:var(--accent);font-style:italic}
  .toc-card button.cur .m{color:var(--accent)}

  .missing{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:18px;padding:40px;z-index:5}
  .missing.show{display:flex}
  .missing h2{font-family:var(--disp);font-style:italic;font-weight:300;font-size:clamp(28px,4vw,44px);color:var(--text)}
  .missing a{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);text-decoration:none;border:1px solid var(--accent);padding:12px 24px}
  .missing a:hover{background:var(--accent);color:var(--page)}

  .chrome button.on{color:var(--accent)}

  /* leave-a-mark sheet */
  .sheet{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;padding:24px}
  .sheet.open{display:flex}
  .sheet-card{background:var(--page);color:var(--text);max-width:440px;width:100%;padding:26px 26px 20px;border-radius:4px;box-shadow:0 30px 70px -30px rgba(0,0,0,.7)}
  .sheet-card h4{font-family:var(--mono);font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
  .sheet-card .x{float:right;font-family:var(--mono);font-size:11px;color:var(--muted);cursor:pointer;letter-spacing:.1em}
  .sheet-lead{font-family:var(--disp);font-style:italic;font-size:14px;color:var(--muted);margin-bottom:14px}
  .sheet-card textarea{width:100%;background:var(--page2);border:1px solid var(--edge);border-radius:3px;padding:12px 14px;font-family:var(--body);font-size:16px;color:var(--text);outline:none;resize:vertical;transition:border-color .2s}
  .sheet-card textarea:focus{border-color:var(--accent)}
  .sheet-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:14px}
  .sheet-msg{font-family:var(--disp);font-style:italic;color:var(--accent);font-size:14px}
  .sheet-foot button{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--page);background:var(--accent);border:none;border-radius:3px;padding:11px 18px;cursor:pointer;transition:opacity .2s}
  .sheet-foot button:hover{opacity:.88}
  .rtoast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);z-index:60;background:var(--text);color:var(--page);font-family:var(--disp);font-style:italic;font-size:14px;padding:10px 18px;border-radius:3px;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s}
  .rtoast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* clickable character names → info popover */
  .char-ref{border-bottom:1px dashed var(--accent);cursor:pointer;transition:background .2s}
  .char-ref:hover{background:color-mix(in srgb,var(--accent) 14%,transparent)}
  .char-pop{position:fixed;z-index:70;display:none;width:304px;max-width:88vw;background:var(--page);color:var(--text);border:1px solid var(--edge);border-radius:5px;box-shadow:0 26px 64px -26px rgba(0,0,0,.62);padding:18px 20px}
  .char-pop .cp-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
  .char-pop .cp-av{width:38px;height:38px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-style:italic;font-size:18px;color:#fff}
  .char-pop .cp-name{font-family:var(--disp);font-weight:500;font-size:20px;line-height:1.12}
  .char-pop .cp-role{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-top:4px}
  .char-pop .cp-x{margin-left:auto;background:none;border:none;font-size:20px;line-height:1;color:var(--faint);cursor:pointer;padding:0}
  .char-pop .cp-x:hover{color:var(--accent)}
  .char-pop .cp-line{font-family:var(--disp);font-style:italic;font-size:15px;color:var(--accent);line-height:1.45;margin-bottom:8px}
  .char-pop .cp-desc{font-family:var(--body);font-size:14px;line-height:1.55;color:var(--text)}

  /* select a line → mark / share */
  .sel-bar{position:fixed;z-index:65;display:none;gap:2px;background:var(--text);border-radius:100px;padding:4px;box-shadow:0 14px 32px -12px rgba(0,0,0,.55)}
  .sel-bar button{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--page);background:none;border:none;cursor:pointer;padding:7px 14px;border-radius:100px;transition:background .2s}
  .sel-bar button:hover{background:rgba(150,150,150,.22)}

  /* reading settings panel (size + typeface + width) */
  .type-panel{position:fixed;top:56px;right:22px;z-index:45;display:none;background:var(--page);color:var(--text);border:1px solid var(--edge);border-radius:7px;box-shadow:0 24px 60px -22px rgba(0,0,0,.6);padding:16px 18px 14px;width:284px;max-width:92vw}
  .type-panel.open{display:block}
  .type-panel .tp-title{font-family:var(--disp);font-style:italic;font-size:17px;color:var(--text);margin-bottom:12px}
  .type-panel .tp-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin:11px 0}
  .type-panel .tp-k{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint)}
  .type-panel .seg{display:inline-flex;border:1px solid var(--edge);border-radius:100px;overflow:hidden}
  .type-panel .seg button{font-family:var(--mono);font-size:10px;letter-spacing:.03em;text-transform:uppercase;color:var(--muted);background:none;border:none;cursor:pointer;padding:7px 13px;transition:background .2s,color .2s}
  .type-panel .seg button:hover{color:var(--accent)}
  .type-panel .seg button.on{background:var(--accent);color:var(--page)}
  .type-panel .seg button.on:hover{color:var(--page)}

  /* end-of-piece card */
  .copy.ending{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:0}
  .copy.ending .end-mark{font-family:var(--disp);color:var(--accent);letter-spacing:.3em;font-size:16px;margin-bottom:6px}
  .copy.ending .end-end{font-family:var(--mono);font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--faint)}
  .copy.ending .end-q{font-family:var(--disp);font-style:italic;font-size:clamp(14px,1.7vw,17px);line-height:1.4;color:var(--text);max-width:32ch;margin:12px 0 4px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .copy.ending .end-by{font-family:var(--disp);font-style:italic;color:var(--muted);font-size:14px;margin-bottom:15px}
  .copy.ending .end-actions{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;margin-bottom:14px}
  .copy.ending .end-actions button{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);background:none;border:1px solid var(--edge);border-radius:100px;padding:9px 14px;cursor:pointer;transition:.2s}
  .copy.ending .end-actions button:hover{border-color:var(--accent);color:var(--accent)}
  .copy.ending .end-next{font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin-bottom:12px;line-height:1.5}
  .copy.ending .end-next a{display:block;font-family:var(--disp);font-style:italic;text-transform:none;letter-spacing:0;font-size:17px;line-height:1.5;color:var(--accent);cursor:pointer;text-decoration:none}
  .copy.ending .end-lib{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);text-decoration:none}
  .copy.ending .end-lib:hover{color:var(--accent)}

  @media (max-width:600px){ .chrome .mid{display:none} .tools{gap:11px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch} .tools::-webkit-scrollbar{display:none} .type-panel{right:12px} }
  @media (prefers-reduced-motion: reduce){ .flipping .flip{transition:none} .progress{transition:none} }

  a:focus-visible,button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--scarlet,var(--accent,#B8472E));outline-offset:2px;border-radius:2px}
</style>
</head>
<body class="day">
<script>/* no-flash reading theme — follows the site-wide light/dark choice */try{(function(){var t=localStorage.getItem('wm.theme')||localStorage.getItem('wm.reader.mode');var book=localStorage.getItem('wm.reader.book');var m;if(t==='light')m='day';else if(t==='dark')m=(book==='sepia'||book==='night')?book:'night';else m=(book==='day'||book==='sepia'||book==='night')?book:'day';document.body.className=m;})();}catch(e){}</script>

<div class="chrome">
  <a href="library.html" class="back"><span class="arrow">←</span>Library</a>
  <div class="mid" id="chromeTitle">…</div>
  <div class="tools">
    <span class="seg" id="theme"><button data-t="day" class="on">Day</button><button data-t="sepia">Sepia</button><button data-t="night">Night</button></span>
    <button id="typeBtn" title="Text size, typeface & width">Aa</button>
    <button id="markBtn" title="Leave a mark">✎ Mark</button>
    <button id="saveBtn" title="Save to shelf">♡ Save</button>
    <button id="shareBtn" title="Share this piece">↗ Share</button>
    <button id="tocBtn">☰ Contents</button>
  </div>
</div>

<div class="type-panel" id="typePanel" role="dialog" aria-label="Reading settings">
  <div class="tp-title">Reading</div>
  <div class="tp-row"><span class="tp-k">Text size</span>
    <span class="seg" id="size"><button data-s="0">A−</button><button data-s="1" class="on">A</button><button data-s="2">A+</button></span></div>
  <div class="tp-row"><span class="tp-k">Typeface</span>
    <span class="seg" id="fontSeg"><button data-f="serif" class="on">Serif</button><button data-f="book">Book</button><button data-f="sans">Sans</button></span></div>
  <div class="tp-row"><span class="tp-k">Page width</span>
    <span class="seg" id="widthSeg"><button data-w="narrow">Narrow</button><button data-w="normal" class="on">Normal</button><button data-w="wide">Wide</button></span></div>
</div>

<div class="zone prev" id="zPrev"></div>
<div class="zone next" id="zNext"></div>

<div class="stage">
  <div class="book" id="book">
    <div class="leaf left pg" id="pL"></div>
    <div class="leaf right pg" id="pR"></div>
    <div class="flip" id="flip"><div class="face front pg" id="ff"></div><div class="face back pg" id="fb"></div></div>
  </div>
</div>

<div class="bar">
  <button id="prev">‹ Prev</button>
  <span class="count" id="count"></span>
  <button id="next">Next ›</button>
</div>
<div class="progress" id="prog"></div>

<div class="toc" id="toc"><div class="toc-card"><h4>Contents <span class="x" id="tocX">close ✕</span></h4><div id="tocList"></div></div></div>

<div class="missing" id="missing">
  <h2>This piece could not be found.</h2>
  <a href="library.html">← Back to the Library</a>
</div>

<div class="sheet" id="markSheet">
  <div class="sheet-card">
    <h4>Leave a mark <span class="x" id="markX">close ✕</span></h4>
    <p class="sheet-lead">A line you're keeping, or a quiet note to the author. Anonymous.</p>
    <textarea id="markText" rows="4" placeholder="The sentence that stayed with you…"></textarea>
    <div class="sheet-foot"><span class="sheet-msg" id="markMsg"></span><button id="markSend">Send ✦</button></div>
  </div>
</div>

  <div class="cp-head"><span class="cp-av"></span><div><div class="cp-name"></div><div class="cp-role"></div></div><button class="cp-x" aria-label="Close">×</button></div>
  <div class="cp-line"></div>
  <div class="cp-desc"></div>
</div>
<div class="sel-bar" id="selBar"><button data-sel="mark">✎ Keep</button><button data-sel="copy">⧉ Copy</button><button data-sel="share">↗ Share</button></div>

<script src="wm-config.js?v=8"></script>
<script src="wm.js?v=8"></script>
<script src="wm-supabase.js?v=8"></script>
<script src="wm-i18n.js?v=8"></script>
<script>
(function(){
  var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  var FORMS={fiction:'Fiction', short:'Short', 'tan-van':'Tản văn', poem:'Poem', essay:'Essay'};
  function toastReader(m){ var t=document.getElementById('rtoast'); if(!t) return; t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(function(){ t.classList.remove('show'); },1700); }

  /* ── resolve the story ── */
  function pick(){
    var id = (typeof WM!=='undefined' && WM.getParam) ? WM.getParam('id') : (new URLSearchParams(location.search).get('id'));
    var s = (typeof WM!=='undefined' && WM.getStory) ? WM.getStory(id) : null;
    if(!s && typeof WM!=='undefined' && WM.stories) s = WM.stories[0] || null;
    return s;
  }
  var reqId = (typeof WM!=='undefined' && WM.getParam) ? WM.getParam('id') : (new URLSearchParams(location.search).get('id'));
  function showMissing(){ document.getElementById('missing').classList.add('show'); }

  function start(story){
  document.title = story.title + ' — Kody Lâm';
  document.getElementById('chromeTitle').textContent = story.title;
  /* count one read once the backend is ready */
  function doCount(){ try{ if(WM.countRead) WM.countRead(story.id); }catch(e){} }
  if(typeof WM!=='undefined' && WM.online!==undefined) doCount(); else window.addEventListener('wm:ready', doCount, {once:true});

  /* ── markdown → blocks → chapters ── */
  function inline(s){
    s = String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    s = s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
    s = s.replace(/\*([^*\n]+?)\*/g,'<em>$1</em>');
    return s;
  }
  function parseBlocks(md){
    var lines=String(md||'').replace(/\r/g,'').split('\n'), blocks=[], para=[];
    function flush(){ if(para.length){ blocks.push({type:'p', html: inline(para.join(' ')) }); para=[]; } }
    lines.forEach(function(ln){
      var t=ln.trim();
      if(t===''){ flush(); return; }
      if(t.slice(0,3)==='## '){ flush(); blocks.push({type:'chapter', title: inline(t.slice(3).trim()) }); return; }
      if(t.charAt(0)==='>'){ flush(); blocks.push({type:'quote', html: inline(t.replace(/^>\s?/,'').trim()) }); return; }
      para.push(t);
    });
    flush();
    return blocks;
  }
  function roman(n){ return ['','I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII'][n]||(''+n); }
  function toChapters(blocks){
    var chapters=[], cur=null, explicit=blocks.some(function(b){return b.type==='chapter';});
    if(explicit){
      blocks.forEach(function(b){
        if(b.type==='chapter'){ cur={title:b.title, blocks:[]}; chapters.push(cur); }
        else { if(!cur){ cur={title:null, blocks:[]}; chapters.push(cur); } cur.blocks.push(b); }
      });
    } else {
      cur={title:null, blocks:[]}; chapters.push(cur);
      blocks.forEach(function(b){
        if(b.type==='quote' && cur.blocks.length>0){ cur={title:null, blocks:[]}; chapters.push(cur); }
        cur.blocks.push(b);
      });
    }
    chapters.forEach(function(c,idx){ c.num=roman(idx+1); });
    return chapters;
  }
  var CHAPTERS = toChapters(parseBlocks(story.body));
  var SHOW_HEADINGS = CHAPTERS.length>1;

  /* ── title page ── */
  var motifName = (typeof WM!=='undefined' && WM.motifs && WM.motifs[story.motif]) ? WM.motifs[story.motif].name : (story.motif||'');
  var TITLE = '<div class="copy opening">'
    + '<div class="folio">Folio '+(story.folio||'')+' · '+(FORMS[story.form]||story.form||'')+' · '+(story.readTime||'')+' min</div>'
    + '<h1>'+(story.titleHTML||story.title)+'</h1>'
    + '<div class="rule"></div>'
    + '<div class="by">Kody Lâm</div>'
    + '<div class="meta">'+(motifName?('Motif · '+motifName+' &nbsp;·&nbsp; '):'')+'turn with the edges, arrows, or a swipe</div></div>';

  /* ── elements ── */
  var book=document.getElementById('book'),pL=document.getElementById('pL'),pR=document.getElementById('pR'),
      flip=document.getElementById('flip'),ff=document.getElementById('ff'),fb=document.getElementById('fb'),
      countEl=document.getElementById('count'),prog=document.getElementById('prog'),
      prevB=document.getElementById('prev'),nextB=document.getElementById('next');

  function tokenize(html){
    var t=[],buf='',depth=0;
    for(var i=0;i<html.length;i++){var c=html[i];
      if(c==='<')depth++; if(c==='>'){depth--;buf+=c;continue;}
      if(c===' '&&depth===0){ if(buf)t.push(buf); buf=''; } else buf+=c; }
    if(buf)t.push(buf); return t;
  }
  function chapHead(ch){ return '<div class="chap"><span class="cnum">Chapter '+ch.num+'</span>'+(ch.title?'<span class="ctitle">'+ch.title+'</span>':'')+'</div>'; }

  /* ── paginate (measure inside the real right page; fill like a book) ── */
  var bodyPages=[], bodyChapters=[];
  function paginate(){
    var keep = pR.innerHTML;
    pR.innerHTML = '<div class="head"><span>'+story.title+'</span><span>'+(story.folio||'')+'</span></div><div class="copy" id="__gauge"></div><div class="num">— 0 —</div>';
    var mc = pR.querySelector('#__gauge'), headEl = pR.querySelector('.head'), numEl = pR.querySelector('.num');
    var csPg = getComputedStyle(pR), csMc = getComputedStyle(mc);
    var lh = parseFloat(csMc.lineHeight) || (parseFloat(csMc.fontSize)||19)*1.78;
    var contentH = pR.clientHeight - (parseFloat(csPg.paddingTop)||0) - (parseFloat(csPg.paddingBottom)||0);
    var headH = headEl.offsetHeight + (parseFloat(getComputedStyle(headEl).marginBottom)||0);
    var numH  = numEl.offsetHeight;
    var availH = contentH - headH - numH;
    if(!availH || availH < 80) availH = Math.max(160, (pR.clientHeight||520)*0.66);
    mc.style.flex='none'; mc.style.height='auto'; mc.style.minHeight='0'; mc.style.overflow='visible';
    var SAFE = availH - 4;
    var pages=[], cur='', marks=[];
    function fits(h){ mc.innerHTML=h; return mc.scrollHeight<=SAFE; }
    function frag(w,a,b){ return '<p>'+w.slice(a,b+1).join(' ')+'</p>'; }
    function push(){ pages.push(cur); cur=''; }
    CHAPTERS.forEach(function(ch){
      if(cur) push();
      marks.push({ num:ch.num, title:ch.title, page: pages.length+1 });
      if(SHOW_HEADINGS) cur += chapHead(ch);
      ch.blocks.forEach(function(bl){
        if(bl.type==='quote'){
          var q='<div class="pull">'+bl.html+'</div>';
          if(!fits(cur+q) && cur) push();
          cur += q;
        } else {                                  // paragraph → fill / split by words
          var w=tokenize(bl.html), start=0;
          while(start<w.length){
            if(!fits(cur+frag(w,start,start))){ if(cur){ push(); continue; } pages.push(frag(w,start,start)); start++; continue; }
            var lo=start,hi=w.length-1,ans=start;
            while(lo<=hi){ var mid=(lo+hi)>>1; if(fits(cur+frag(w,start,mid))){ ans=mid; lo=mid+1; } else hi=mid-1; }
            cur+=frag(w,start,ans); start=ans+1;
            if(start<w.length) push();
          }
        }
      });
    });
    if(cur) push();
    bodyChapters = marks;
    pR.innerHTML = keep;
    return pages;
  }

  function pageHTML(idx){
    if(idx==null||idx<0) return '<div class="blank"></div>';
    if(idx===0) return TITLE;
    if(idx===endIdx) return '<div class="head"><span>'+story.title+'</span><span>'+(story.folio||'')+'</span></div>'+ENDCARD()+'<div class="num">— ⁂ —</div>';
    var b=idx-1; if(b<0||b>=bodyPages.length) return '<div class="blank"></div>';
    return '<div class="head"><span>'+story.title+'</span><span>'+(story.folio||'')+'</span></div>'
         + '<div class="copy">'+linkChars(bodyPages[b])+'</div>'
         + '<div class="num">— '+(b+1)+' —</div>';
  }

  /* ── spreads + flip ── */
  var spreads,i=0,two,busy=false,total=0,endIdx=0;
  var POSKEY='wm.reader.pos.'+story.id, firstBuild=true;
  var totalMin = story.readTime || Math.max(1, Math.round((typeof WM!=='undefined'&&WM.wordCount?WM.wordCount(story.body):((story.body||'').split(/\s+/).filter(Boolean).length))/200));
  function build(keep){
    two=matchMedia('(min-width:860px)').matches;
    book.classList.toggle('one',!two);
    bodyPages = paginate();
    endIdx = 1 + bodyPages.length;          // the colophon sits right after the last page
    total = endIdx + 1;                     // title + body pages + colophon
    if(two){ spreads=[[null,0]]; for(var k=1;k<total;k+=2) spreads.push([k, k+1<total?k+1:null]); }
    else   { spreads=[]; for(var k2=0;k2<total;k2++) spreads.push([null,k2]); }
    if(!keep||i==null){ i=0; if(firstBuild){ var fr=parseFloat(localStorage.getItem(POSKEY)||'0'); if(fr>0.02 && spreads.length>1){ i=Math.min(spreads.length-1, Math.round(fr*(spreads.length-1))); if(i>0 && !reduce) setTimeout(function(){ toastReader('Resumed where you left off'); },450); } } }
    firstBuild=false;
    if(i>=spreads.length) i=spreads.length-1;
    render();
  }
  function render(){
    pL.innerHTML=pageHTML(spreads[i][0]);
    pR.innerHTML=pageHTML(spreads[i][1]);
    var frac=(spreads.length>1?i/(spreads.length-1):0);
    var left=Math.max(0, Math.round((1-frac)*totalMin));
    countEl.textContent=(i+1)+' / '+spreads.length+(left>0 && i>0?' · '+left+'m left':'');
    prog.style.width=(frac*100)+'%';
    prevB.disabled=(i===0); nextB.disabled=(i===spreads.length-1);
    try{ localStorage.setItem(POSKEY, frac.toFixed(4)); }catch(e){}
    if(i===spreads.length-1){ try{ if(WM.readlog) WM.readlog.mark(story.id); }catch(e){} }
  }
  function turn(dir){
    if(busy)return; var j=i+dir; if(j<0||j>=spreads.length)return;
    if(reduce){ i=j; render(); return; }
    busy=true;
    if(dir>0){ ff.innerHTML=pageHTML(spreads[i][1]); fb.innerHTML=pageHTML(spreads[j][0]); pR.innerHTML=pageHTML(spreads[j][1]); }
    else     { ff.innerHTML=pageHTML(spreads[j][1]); fb.innerHTML=pageHTML(spreads[i][0]); pL.innerHTML=pageHTML(spreads[j][0]); }
    flip.classList.add('show'); flip.style.transition='none';
    flip.style.transform = dir>0?'rotateY(0deg)':'rotateY(-180deg)';
    void flip.offsetWidth;
    book.classList.add('flipping');
    flip.style.transform = dir>0?'rotateY(-180deg)':'rotateY(0deg)';
    var end=function(){ flip.removeEventListener('transitionend',end);
      i=j; render(); book.classList.remove('flipping'); flip.classList.remove('show'); flip.style.transition=''; busy=false; };
    flip.addEventListener('transitionend',end); setTimeout(end,900);
  }
  var next=function(){turn(1);}, prev=function(){turn(-1);};
  nextB.addEventListener('click',next); prevB.addEventListener('click',prev);
  document.getElementById('zNext').addEventListener('click',next);
  document.getElementById('zPrev').addEventListener('click',prev);
  addEventListener('keydown',function(e){ if(e.key==='ArrowRight'||e.key===' ')next(); else if(e.key==='ArrowLeft')prev(); });
  var x0=null;
  addEventListener('touchstart',function(e){x0=e.touches[0].clientX;},{passive:true});
  addEventListener('touchend',function(e){ if(x0==null)return; var dx=e.changedTouches[0].clientX-x0; if(Math.abs(dx)>46)dx<0?next():prev(); x0=null; },{passive:true});

  /* ── tools: font size, theme, contents ── */
  var sizes=['18px','20px','23px'], savedFs;
  try{ savedFs=parseInt(localStorage.getItem('wm.reader.fs')); }catch(e){}
  if(savedFs>=0 && savedFs<=2){ document.documentElement.style.setProperty('--fs',sizes[savedFs]); document.querySelectorAll('#size button').forEach(function(b){ b.classList.toggle('on', +b.dataset.s===savedFs); }); }
  document.querySelectorAll('#size button').forEach(function(b){ b.addEventListener('click',function(){ document.querySelectorAll('#size button').forEach(function(x){x.classList.remove('on');}); b.classList.add('on'); document.documentElement.style.setProperty('--fs',sizes[+b.dataset.s]); try{localStorage.setItem('wm.reader.fs',b.dataset.s);}catch(e){} build(true); }); });

  function applyTheme(t){ document.body.className=t; document.querySelectorAll('#theme button').forEach(function(x){ x.classList.toggle('on', x.dataset.t===t); });
    try{ localStorage.setItem('wm.reader.book',t); localStorage.setItem('wm.theme', t==='day'?'light':'dark'); localStorage.setItem('wm.reader.mode', t==='day'?'light':'dark'); }catch(e){} }
  document.querySelectorAll('#theme button').forEach(function(b){ b.addEventListener('click',function(){ applyTheme(b.dataset.t); }); });
  applyTheme(document.body.className||'day');     // reflect the no-FOUC choice in the buttons

  var toc=document.getElementById('toc');
  function gotoPage(pi){ for(var s=0;s<spreads.length;s++){ if(spreads[s][0]===pi||spreads[s][1]===pi){ i=s; render(); break; } } toc.classList.remove('open'); }
  function buildTOC(){
    var list=document.getElementById('tocList'); list.innerHTML='';
    var lead=document.createElement('div'); lead.className='lead'; lead.textContent=story.title; list.appendChild(lead);
    var curPage=(spreads[i][1]!=null?spreads[i][1]:spreads[i][0]);
    var curIdx=0; bodyChapters.forEach(function(ch,idx){ if(ch.page<=curPage) curIdx=idx; });
    bodyChapters.forEach(function(ch,idx){
      var bn=document.createElement('button');
      bn.innerHTML='<span class="t">Chapter '+ch.num+(ch.title?' · '+ch.title:'')+'</span><span class="m">p.'+ch.page+'</span>';
      if(idx===curIdx) bn.className='cur';
      bn.addEventListener('click',function(){ gotoPage(ch.page); });
      list.appendChild(bn);
    });
  }
  document.getElementById('tocBtn').addEventListener('click',function(){ buildTOC(); toc.classList.add('open'); });
  document.getElementById('tocX').addEventListener('click',function(){ toc.classList.remove('open'); });
  toc.addEventListener('click',function(e){ if(e.target===toc) toc.classList.remove('open'); });

  /* ── end-of-piece colophon + reader actions ── */
  var sameMotif = (typeof WM!=='undefined' && WM.getStoriesByMotif && story.motif) ? WM.getStoriesByMotif(story.motif).filter(function(s){return s.id!==story.id;}) : [];
  var MORE = sameMotif.length ? sameMotif.slice(0,2) : ((typeof WM!=='undefined' && WM.getRelatedStories) ? WM.getRelatedStories(story.id,2) : []);
  var motifLabel = (typeof WM!=='undefined' && WM.motifs && WM.motifs[story.motif]) ? WM.motifs[story.motif].name : '';

  /* ── characters: clickable names → an info card ── */
  var CHARS={}, byName={}, charNames=[];
  function indexChars(list){ (list||[]).forEach(function(c){ if(c&&c.id&&c.name){ CHARS[c.id]=c; byName[c.name]=c; } }); charNames=Object.keys(byName).sort(function(a,b){return b.length-a.length;}); }
  (function(){
    var ids=[]; try{ ids=(WM.pieceMeta.get(story.id).characters)||[]; }catch(e){}
    if(Array.isArray(story.characters)) ids=ids.concat(story.characters);
    ids=ids.filter(function(v,i){return v&&ids.indexOf(v)===i;});
    var local=[]; try{ (WM.characters.all()||[]).forEach(function(c){ if(ids.indexOf(c.id)>=0) local.push(c); }); }catch(e){}
    indexChars(local);
    if(!charNames.length && typeof WM!=='undefined' && WM.fetchCharactersForPiece){
      WM.fetchCharactersForPiece(story.id).then(function(list){ if(list&&list.length){ indexChars(list); build(true); } });
    }
  })();
  function escRe(s){ return String(s).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
  function linkChars(html){
    if(!charNames.length) return html;
    var re;
    try{ re=new RegExp('(^|[^\\p{L}\\p{M}])('+charNames.map(escRe).join('|')+')(?![\\p{L}\\p{M}])','gu'); }
    catch(e){ re=new RegExp('(^|[^A-Za-zÀ-ỹ])('+charNames.map(escRe).join('|')+')(?![A-Za-zÀ-ỹ])','g'); }
    return html.replace(/>([^<]+)</g,function(m,text){
      return '>'+text.replace(re,function(mm,pre,nm){ var c=byName[nm]; return c?pre+'<span class="char-ref" data-char="'+c.id+'">'+nm+'</span>':mm; })+'<';
    });
  }
  var charPop=document.getElementById('charPop');
  function showCharPop(id, el){
    var c=CHARS[id]; if(!c||!charPop) return;
    charPop.querySelector('.cp-name').textContent=c.name||'';
    charPop.querySelector('.cp-role').textContent=[c.role,c.age].filter(Boolean).join(' · ');
    var av=charPop.querySelector('.cp-av'); av.style.background=c.color||'var(--accent)'; av.textContent=(c.name||'?').trim().charAt(0);
    var line=charPop.querySelector('.cp-line'); line.textContent=c.oneLine||''; line.style.display=c.oneLine?'':'none';
    var desc=charPop.querySelector('.cp-desc'); desc.textContent=c.description||''; desc.style.display=c.description?'':'none';
    charPop.style.display='block';
    var r=el.getBoundingClientRect(), pw=charPop.offsetWidth, ph=charPop.offsetHeight;
    var left=Math.min(Math.max(12, r.left+r.width/2-pw/2), innerWidth-pw-12);
    var top=r.bottom+10; if(top+ph>innerHeight-12) top=Math.max(12, r.top-ph-10);
    charPop.style.left=left+'px'; charPop.style.top=top+'px';
  }
  function hideCharPop(){ if(charPop) charPop.style.display='none'; }
  if(charPop){ charPop.querySelector('.cp-x').addEventListener('click', hideCharPop); }
  document.addEventListener('click', function(e){ if(charPop && charPop.style.display==='block' && !(e.target.closest&&(e.target.closest('.char-pop')||e.target.closest('.char-ref')))) hideCharPop(); });
  addEventListener('keydown', function(e){ if(e.key==='Escape') hideCharPop(); });

  /* ── select a line → keep / copy / share ── */
  (function(){
    var selBar=document.getElementById('selBar'); if(!selBar) return;
    var lastText='';
    function inCopy(node){ if(!node) return false; var el=node.nodeType===1?node:node.parentElement; return !!(el && el.closest && el.closest('.copy') && !el.closest('.ending')); }
    function hideSel(){ selBar.style.display='none'; lastText=''; }
    function showSel(){
      var sel=window.getSelection&&window.getSelection(); if(!sel||sel.isCollapsed||!sel.rangeCount){ hideSel(); return; }
      var txt=(sel.toString()||'').replace(/\s+/g,' ').trim();
      if(txt.length<2 || !inCopy(sel.anchorNode) || !inCopy(sel.focusNode)){ hideSel(); return; }
      lastText=txt;
      var r=sel.getRangeAt(0).getBoundingClientRect();
      selBar.style.display='flex';
      var bw=selBar.offsetWidth, bh=selBar.offsetHeight;
      var left=Math.min(Math.max(10, r.left+r.width/2-bw/2), innerWidth-bw-10);
      var top=r.top-bh-8; if(top<10) top=r.bottom+8;
      selBar.style.left=left+'px'; selBar.style.top=top+'px';
    }
    document.addEventListener('mouseup', function(){ setTimeout(showSel,10); });
    document.addEventListener('touchend', function(){ setTimeout(showSel,10); }, {passive:true});
    document.addEventListener('selectionchange', function(){ var sel=window.getSelection&&window.getSelection(); if(!sel||sel.isCollapsed) hideSel(); });
    selBar.addEventListener('mousedown', function(e){ e.preventDefault(); });   // keep the selection alive
    selBar.addEventListener('click', function(e){
      var b=e.target.closest('[data-sel]'); if(!b||!lastText) return;
      var act=b.dataset.sel, txt=lastText, quote='“'+txt+'” — '+story.title+', Kody Lâm';
      if(act==='mark'){ try{ WM.marks.add({storyId:story.id, storyTitle:story.title, text:txt}); }catch(e){} toastReader('Kept to your marks ✦'); }
      else if(act==='copy'){ if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(quote).then(function(){toastReader('Copied ✦');},function(){window.prompt('Copy:',quote);}); else window.prompt('Copy:',quote); }
      else if(act==='share'){ if(navigator.share) navigator.share({title:story.title+' — Kody Lâm', text:'“'+txt+'”', url:location.href}).catch(function(){}); else if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(quote+' '+location.href).then(function(){toastReader('Copied to share ✦');},function(){}); else window.prompt('Copy:',quote); }
      var s=window.getSelection&&window.getSelection(); if(s&&s.removeAllRanges) s.removeAllRanges();
      hideSel();
    });
    window.addEventListener('scroll', hideSel, {passive:true});
  })();

  /* ── reading type: typeface + page width (persisted; re-paginates) ── */
  (function(){
    var FONTS={ serif:'"Spectral",Georgia,serif', book:'"Fraunces",Georgia,serif', sans:'system-ui,-apple-system,"Segoe UI",Roboto,sans-serif' };
    var WIDTHS={ narrow:'820px', normal:'940px', wide:'1080px' };
    var panel=document.getElementById('typePanel'), btn=document.getElementById('typeBtn');
    var fontSeg=document.getElementById('fontSeg'), widthSeg=document.getElementById('widthSeg'), root=document.documentElement;
    function seg(el,val,attr){ if(!el) return; el.querySelectorAll('button').forEach(function(b){ b.classList.toggle('on', b.dataset[attr]===val); }); }
    var savedF, savedW;
    try{ savedF=localStorage.getItem('wm.reader.font'); savedW=localStorage.getItem('wm.reader.width'); }catch(e){}
    if(!FONTS[savedF]) savedF='serif'; if(!WIDTHS[savedW]) savedW='normal';
    root.style.setProperty('--readfont', FONTS[savedF]); seg(fontSeg, savedF, 'f');
    root.style.setProperty('--bookw', WIDTHS[savedW]); seg(widthSeg, savedW, 'w');
    function applyFont(f){ if(!FONTS[f]) return; root.style.setProperty('--readfont', FONTS[f]); seg(fontSeg,f,'f'); try{localStorage.setItem('wm.reader.font',f);}catch(e){} build(true); }
    function applyWidth(w){ if(!WIDTHS[w]) return; root.style.setProperty('--bookw', WIDTHS[w]); seg(widthSeg,w,'w'); try{localStorage.setItem('wm.reader.width',w);}catch(e){} build(true); }
    if(fontSeg) fontSeg.addEventListener('click', function(e){ var b=e.target.closest('[data-f]'); if(b) applyFont(b.dataset.f); });
    if(widthSeg) widthSeg.addEventListener('click', function(e){ var b=e.target.closest('[data-w]'); if(b) applyWidth(b.dataset.w); });
    if(btn&&panel) btn.addEventListener('click', function(e){ e.stopPropagation(); var open=panel.classList.toggle('open'); btn.classList.toggle('on',open); });
    document.addEventListener('click', function(e){ if(panel&&panel.classList.contains('open') && !(e.target.closest&&(e.target.closest('#typePanel')||e.target.closest('#typeBtn')))){ panel.classList.remove('open'); if(btn)btn.classList.remove('on'); } });
    addEventListener('keydown', function(e){ if(e.key==='Escape' && panel&&panel.classList.contains('open')){ panel.classList.remove('open'); if(btn)btn.classList.remove('on'); } });
  })();
  function ENDCARD(){
    var saved = !!(WM.shelf && WM.shelf.has && WM.shelf.has(story.id));
    return '<div class="copy ending">'
      + '<div class="end-mark">⁂</div>'
      + '<div class="end-end">— end —</div>'
      + (story.excerpt?'<div class="end-q">"'+inline(story.excerpt)+'"</div>':'')
      + '<div class="end-by">Kody Lâm</div>'
      + '<div class="end-actions"><button data-act="mark">✎ Leave a mark</button><button data-act="save">'+(saved?'♥ Saved':'♡ Save to shelf')+'</button><button data-act="share">↗ Share</button></div>'
      + (MORE.length?'<div class="end-next"><span>'+(sameMotif.length?('More in '+inline(motifLabel)):'Read next')+'</span>'+MORE.map(function(s){return '<a data-next="'+s.id+'">'+s.title+' →</a>';}).join('')+'</div>':'')
      + '<a class="end-lib" href="library.html">← Back to the Library</a>'
      + '</div>';
  }
  function reflectSave(){
    var on = !!(WM.shelf && WM.shelf.has && WM.shelf.has(story.id));
    var b=document.getElementById('saveBtn'); if(b){ b.classList.toggle('on',on); b.textContent=on?'♥ Saved':'♡ Save'; }
    var e2=book.querySelector('.ending [data-act="save"]'); if(e2) e2.textContent=on?'♥ Saved':'♡ Save to shelf';
  }
  function toggleSave(){ try{ if(WM.shelf&&WM.shelf.toggle){ WM.shelf.toggle(story.id); reflectSave(); } }catch(e){} }
  document.getElementById('saveBtn').addEventListener('click', toggleSave);
  function doShare(){
    var url=location.href, title=story.title+' — Kody Lâm', text='"'+(story.excerpt||story.title)+'"';
    if(navigator.share){ navigator.share({title:title,text:text,url:url}).catch(function(){}); }
    else if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(url).then(function(){ toastReader('Link copied ✦'); }, function(){ window.prompt('Copy this link:',url); }); }
    else { window.prompt('Copy this link:',url); }
  }
  document.getElementById('shareBtn').addEventListener('click', doShare);

  var markSheet=document.getElementById('markSheet');
  function openMark(){ markSheet.classList.add('open'); var t=document.getElementById('markText'); if(t) setTimeout(function(){t.focus();},60); }
  function closeMark(){ markSheet.classList.remove('open'); }
  document.getElementById('markBtn').addEventListener('click', openMark);
  document.getElementById('markX').addEventListener('click', closeMark);
  markSheet.addEventListener('click', function(e){ if(e.target===markSheet) closeMark(); });
  document.getElementById('markSend').addEventListener('click', function(){
    var t=document.getElementById('markText'), msg=document.getElementById('markMsg');
    var v=(t.value||'').trim(); if(!v){ t.focus(); return; }
    try{ WM.marks.add({storyId:story.id, storyTitle:story.title, text:v}); }catch(e){}
    t.value=''; if(msg) msg.textContent='Kept — thank you ✦';
    setTimeout(closeMark,1100); setTimeout(function(){ if(msg) msg.textContent=''; },1400);
  });
  book.addEventListener('click', function(e){
    var cr=e.target.closest('[data-char]'); if(cr){ e.stopPropagation(); showCharPop(cr.dataset.char, cr); return; }
    var a=e.target.closest('[data-act]'); if(a){ e.stopPropagation(); var act=a.dataset.act; if(act==='mark')openMark(); else if(act==='share')doShare(); else toggleSave(); return; }
    var n=e.target.closest('[data-next]'); if(n){ e.stopPropagation(); location.href='reader.html?id='+encodeURIComponent(n.dataset.next); }
  });
  if(typeof WM!=='undefined' && WM.online!==undefined) reflectSave(); else window.addEventListener('wm:ready', reflectSave, {once:true});

  var rt; addEventListener('resize',function(){ clearTimeout(rt); rt=setTimeout(function(){build(true);},180); },{passive:true});
  build();
  if(document.fonts && document.fonts.ready) document.fonts.ready.then(function(){build(true);});
  addEventListener('load',function(){build(true);});
  }  /* ── end start() ── */

  /* ── boot: resolve the piece, awaiting the backend for server-only pieces ── */
  var first = pick();
  if(first){ start(first); }
  else if(typeof WM!=='undefined' && WM.online!==undefined){
    if(WM.fetchPiece && reqId) WM.fetchPiece(reqId).then(function(x){ x?start(x):showMissing(); }); else showMissing();
  } else {
    window.addEventListener('wm:ready', function(){
      var s=pick(); if(s){ start(s); return; }
      if(typeof WM!=='undefined' && WM.fetchPiece && reqId){ WM.fetchPiece(reqId).then(function(x){ x?start(x):showMissing(); }); }
      else showMissing();
    }, {once:true});
  }
})();
</script>
</body>
</html>
