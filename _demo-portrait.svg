<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000" role="img" aria-label="Placeholder — your banner photo (you standing on the right)">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0.35">
      <stop offset="0" stop-color="#F3ECDC"/>
      <stop offset="0.5" stop-color="#E9DDC6"/>
      <stop offset="1" stop-color="#D7C5A6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.7" cy="0.26" r="0.55">
      <stop offset="0" stop-color="#FCF7EC" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FCF7EC" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fig" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#574C3B"/>
      <stop offset="1" stop-color="#332C22"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C9A24B" stop-opacity="0"/>
      <stop offset="1" stop-color="#C9A24B" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>

  <!-- a tall window suggestion behind, upper-right -->
  <g opacity="0.12" fill="#7C6E52">
    <rect x="1015" y="40" width="8" height="560"/>
    <rect x="1230" y="40" width="8" height="560"/>
    <rect x="1445" y="40" width="8" height="560"/>
    <rect x="1015" y="300" width="438" height="7"/>
  </g>

  <!-- the figure: a standing person on the right, facing the text -->
  <g transform="translate(1120 250)">
    <ellipse cx="120" cy="742" rx="250" ry="42" fill="#000" opacity="0.10"/>
    <!-- torso / shoulders down to frame edge -->
    <path d="M -120 760 C -120 500 -30 452 130 452 C 300 452 360 520 372 760 Z" fill="url(#fig)"/>
    <!-- neck -->
    <rect x="92" y="372" width="80" height="118" rx="34" fill="url(#fig)"/>
    <!-- head -->
    <ellipse cx="132" cy="278" rx="116" ry="138" fill="url(#fig)"/>
    <!-- hair -->
    <path d="M 16 262 C 12 150 252 146 250 268 C 250 196 196 150 132 150 C 64 150 18 198 16 262 Z" fill="#2B2520"/>
    <!-- warm rim light on the right edge -->
    <path d="M 250 300 C 270 460 320 600 372 760 L 372 300 Z" fill="url(#rim)" opacity="0.7"/>
  </g>

  <text x="1240" y="936" text-anchor="middle" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="20" letter-spacing="5" fill="#857658">ẢNH CỦA BẠN · YOUR PHOTO (đứng bên phải)</text>
</svg>
